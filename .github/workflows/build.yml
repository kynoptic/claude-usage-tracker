name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 20

    # CI builds use no code signing (faster, sufficient for testing)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        # Select the latest Xcode available on the runner without hard-coding a version path.
        # The codebase requires Xcode 26+ (Swift nonisolated deinit support).
        # Using `sort -V | tail -1` picks the newest installed version automatically.
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Show Build Environment
        run: |
          xcodebuild -version
          swift --version
          echo "macOS: $(sw_vers -productVersion)"

      - name: Install SwiftLint
        # Baseline captures violations by rule ID + location, so new SwiftLint versions
        # only affect enforcement if rules change behavior (not if new rules are added).
        run: brew install swiftlint

      - name: SwiftLint (new violations only)
        run: swiftlint lint --baseline .swiftlint.baseline --strict

      - name: Build Debug (for tests)
        run: |
          xcodebuild build \
            -project "Claude Usage.xcodeproj" \
            -scheme "Claude Usage" \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run Tests
        run: |
          xcodebuild test \
            -project "Claude Usage.xcodeproj" \
            -scheme "Claude Usage" \
            -configuration Debug \
            -derivedDataPath build \
            -destination "platform=macOS" \
            -skip-testing:"Claude UsageTests/KeychainServiceTests" \
            -skip-testing:"Claude UsageTests/KeychainServicePerProfileTests" \
            -skip-testing:"Claude UsageTests/KeychainPerProfileMigrationServiceTests" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build Release
        run: |
          xcodebuild build \
            -project "Claude Usage.xcodeproj" \
            -scheme "Claude Usage" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create App Bundle Artifact
        run: |
          mkdir -p artifacts
          cp -R "build/Build/Products/Release/Claude Usage.app" artifacts/

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-${{ github.sha }}
          path: artifacts/
          retention-days: 7
