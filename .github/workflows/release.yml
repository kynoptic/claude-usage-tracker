name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.4.1)'
        required: true

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Resolve Tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Select Xcode
        # Select the latest Xcode available on the runner without hard-coding a version path.
        # The codebase requires Xcode 26+ (Swift nonisolated deinit support).
        # Using `sort -V | tail -1` picks the newest installed version automatically.
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting Xcode: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Show Build Environment
        run: |
          xcodebuild -version
          swift --version
          echo "macOS: $(sw_vers -productVersion)"
          echo "Tag: ${{ steps.tag.outputs.value }}"

      - name: Build Release
        run: |
          xcodebuild build \
            -project "Claude Usage.xcodeproj" \
            -scheme "Claude Usage" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          echo "✅ Build completed successfully"

      - name: Create Release Artifact
        run: |
          mkdir -p release

          cp -pR "build/Build/Products/Release/Claude Usage.app" release/

          cd release
          ditto -c -k --keepParent "Claude Usage.app" "Claude-Usage.zip"
          shasum -a 256 "Claude-Usage.zip" > "Claude-Usage.zip.sha256"

          echo "SHA256 Checksum:"
          cat "Claude-Usage.zip.sha256"

      - name: Extract Release Notes from CHANGELOG
        id: changelog_notes
        continue-on-error: true
        run: |
          VERSION="${{ steps.tag.outputs.value }}"
          VERSION="${VERSION#v}"

          awk "/## \[$VERSION\]/{flag=1; next} /^---$|^## \[/{flag=0} flag" CHANGELOG.md > release-notes.md
          sed -i '' -e '/^$/d' release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "changelog_extracted=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "changelog_extracted=true" >> $GITHUB_OUTPUT

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.value }}
          tag_name: ${{ steps.tag.outputs.value }}
          draft: false
          body_path: ${{ steps.changelog_notes.outputs.changelog_extracted == 'true' && 'release-notes.md' || '' }}
          generate_release_notes: ${{ steps.changelog_notes.outputs.changelog_extracted != 'true' }}
          files: |
            release/Claude-Usage.zip
            release/Claude-Usage.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
